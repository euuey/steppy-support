<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steppy — Account Deletion Request</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Noto Sans JP", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e8eaf0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    .app-name span { color: #4f6ef7; }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: #f0f2f7;
      border-radius: 10px;
      padding: 4px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 7px;
      color: #6b7585;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .lang-btn.active {
      background: #ffffff;
      color: #4f6ef7;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    main {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px 40px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .page-subtitle {
      font-size: 15px;
      color: #5a6478;
      margin-bottom: 36px;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2 .icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #eef0fd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .card p {
      font-size: 14.5px;
      color: #4a5568;
      margin-bottom: 10px;
    }

    .card p:last-child { margin-bottom: 0; }

    .card ul {
      list-style: none;
      padding: 0;
    }

    .card ul li {
      font-size: 14.5px;
      color: #4a5568;
      padding: 5px 0 5px 22px;
      position: relative;
    }

    .card ul li::before {
      content: "•";
      color: #4f6ef7;
      font-weight: 700;
      position: absolute;
      left: 6px;
    }

    .highlight-box {
      background: #f0f3ff;
      border: 1px solid #d6dcff;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: #3b4a8a;
      margin-top: 14px;
    }

    .highlight-box strong { font-weight: 600; }

    .btn-primary {
      display: inline-block;
      background: #4f6ef7;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      margin-top: 20px;
      transition: background 0.18s ease;
      text-align: center;
      width: 100%;
    }

    .btn-primary:hover { background: #3a57e8; }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #fff3cd;
      color: #856404;
      padding: 3px 9px;
      border-radius: 5px;
      margin-left: 8px;
      vertical-align: middle;
    }

    footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 13px;
      color: #9aa3b5;
      border-top: 1px solid #e8eaf0;
      background: #ffffff;
    }

    footer a {
      color: #4f6ef7;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .page-title { font-size: 23px; }
      .card { padding: 22px 20px; }
      .lang-btn { font-size: 12px; padding: 5px 10px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="app-name"><span>Steppy</span></div>
    <div class="lang-toggle">
      <button class="lang-btn" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
      <button class="lang-btn active" onclick="setLang('en')">English</button>
    </div>
  </header>

  <main>
    <h1 class="page-title" data-i18n="title"></h1>
    <p class="page-subtitle" data-i18n="subtitle"></p>

    <!-- How to Request -->
    <div class="card">
      <h2><span class="icon">✉️</span> <span data-i18n="sec1_title"></span></h2>
      <p data-i18n="sec1_body"></p>
      <div class="highlight-box">
        <strong data-i18n="sec1_box_label"></strong><br />
        <span data-i18n="sec1_box_body"></span>
      </div>
      <a class="btn-primary" id="delete-btn" href="#">
        <span data-i18n="btn"></span>
      </a>
    </div>

    <!-- What Will Be Deleted -->
    <div class="card">
      <h2><span class="icon">🗑️</span> <span data-i18n="sec2_title"></span></h2>
      <p data-i18n="sec2_intro"></p>
      <ul>
        <li data-i18n="sec2_li1"></li>
        <li data-i18n="sec2_li2"></li>
        <li data-i18n="sec2_li3"></li>
        <li data-i18n="sec2_li4"></li>
      </ul>
    </div>

    <!-- What May Be Retained -->
    <div class="card">
      <h2>
        <span class="icon">📋</span>
        <span data-i18n="sec3_title"></span>
        <span class="tag" data-i18n="tag"></span>
      </h2>
      <p data-i18n="sec3_intro"></p>
      <ul>
        <li data-i18n="sec3_li1"></li>
        <li data-i18n="sec3_li2"></li>
        <li data-i18n="sec3_li3"></li>
        <li data-i18n="sec3_li4"></li>
      </ul>
      <p style="margin-top: 12px;" data-i18n="sec3_footer"></p>
    </div>

    <!-- Processing Time -->
    <div class="card">
      <h2><span class="icon">⏱️</span> <span data-i18n="sec4_title"></span></h2>
      <p data-i18n="sec4_body"></p>
    </div>

    <!-- Contact -->
    <div class="card">
      <h2><span class="icon">💬</span> <span data-i18n="sec5_title"></span></h2>
      <p data-i18n="sec5_body"></p>
      <p><a href="mailto:euuey00700@gmail.com">euuey00700@gmail.com</a></p>
    </div>
  </main>

  <footer>
    &copy; 2025 Steppy &nbsp;·&nbsp;
    <a href="mailto:euuey00700@gmail.com">euuey00700@gmail.com</a>
  </footer>

        mail_body: "안녕하세요,\n\nSteppy 계정 삭제를 요청드립니다.\n\nGoogle 계정 이메일: [이메일 주소 입력]\n\n감사합니다.",

      ja: {
        title: "アカウント削除リクエスト",

        tag: "一時的",

        sec3_li4: "集計・匿名化された分析データ（個人を特定しない）",

      en: {
        title: "Account Deletion Request",
        subtitle: "You can request the permanent deletion of your Steppy account and all associated data at any time.",
        sec1_title: "How to Request Deletion",
        sec1_body: "Send an email to our support team using the button below. To verify ownership of the account, please include the Google account email address you used to sign in to Steppy.",

        sec1_box_body: "The Google account email address associated with your Steppy account (e.g., yourname@gmail.com).",
        btn: "Request Account Deletion",
        sec2_title: "What Will Be Deleted",
        sec2_intro: "Upon confirmation of your deletion request, the following data will be permanently removed:",
        sec2_li1: "Your account profile and authentication information",
        sec2_li2: "All game progress, step records, and activity history",
        sec2_li3: "In-app preferences and settings",
        sec2_li4: "Any other personal data associated with your account",
        sec3_title: "What May Be Retained",
        tag: "Temporary",

        sec3_li2: "Security incident investigation and fraud prevention",
        sec3_li3: "Resolving outstanding disputes or enforcing our terms",
        sec3_li4: "Aggregated, anonymized analytics (not linked to your identity)",
        sec3_footer: "Any retained data will be deleted as soon as the applicable retention period expires.",
        sec4_title: "Processing Time",
        sec4_body: "We will process your account deletion request <strong>within 7 business days</strong> of receiving your email. You will receive a confirmation once the deletion is complete.",

        sec5_body: "If you have any questions about this process or your data, feel free to reach out:",
        mail_subject: "Account Deletion Request - Steppy",
        mail_body: "Hello,\n\nI would like to request the deletion of my Steppy account.\n\nGoogle account email: [your-email@gmail.com]\n\nThank you.",
      }
    };

    function setLang(lang) {
      const t = i18n[lang];
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      // Update mailto button
      const btn = document.getElementById("delete-btn");
      btn.href = "mailto:" + SUPPORT_EMAIL
        + "?subject=" + encodeURIComponent(t.mail_subject)
        + "&body=" + encodeURIComponent(t.mail_body);

      // Update lang buttons
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".lang-btn").forEach(b => {
        if (b.textContent.trim() === (lang === "ko" ? "한국어" : lang === "ja" ? "日本語" : "English")) {
          b.classList.add("active");
        }
      });

      document.documentElement.lang = lang;
    }

    // Auto-detect browser language
    (function () {
      const nav = navigator.language || navigator.userLanguage || "en";
      if (nav.startsWith("ko")) setLang("ko");
      else if (nav.startsWith("ja")) setLang("ja");
      else setLang("en");
    })();
  </script>

</body>
</html>
